<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: Arial;
        }

        .card {
            margin-top: 12px;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.4);
        }

        .title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .form-control {
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            border-radius: 8px;
            font-size: 14px;
            padding: 6px;
        }

        .result {
            margin-top: 12px;
            font-size: 18px;
            font-weight: bold;
        }

        h5 {
            font-size: 14px;
        }

        h3 {
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- 🔥 DASHBOARD (SMALL) -->
    <div class="row text-center mt-3">

        <div class="col">
            <div class="card bg-secondary p-1">
                <h5>Total</h5>
                <h3>{{ total }}</h3>
            </div>
        </div>

        <div class="col">
            <div class="card bg-danger p-1">
                <h5>Fraud</h5>
                <h3>{{ fraud }}</h3>
            </div>
        </div>

        <div class="col">
            <div class="card bg-success p-1">
                <h5>Safe</h5>
                <h3>{{ safe }}</h3>
            </div>
        </div>

    </div>

    <!-- 🔥 FORM (NARROW WIDTH) -->
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card bg-dark">

                <h2 class="title">🚨 Fraud Detection AI</h2>

                <form method="POST">

                    <label>Amount</label>
                    <input type="number" name="amount" class="form-control" placeholder="Enter amount" required><br>

                    <label>Time</label>
                    <select name="time" class="form-control">
                        <option>day</option>
                        <option>evening</option>
                        <option>night</option>
                    </select><br>

                    <label>Location</label>
                    <select name="location" class="form-control">
                        <option>karachi</option>
                        <option>lahore</option>
                        <option>islamabad</option>
                    </select><br>

                    <label>Device</label>
                    <select name="device" class="form-control">
                        <option>mobile</option>
                        <option>other</option>
                    </select><br>

                    <button class="btn btn-success w-100">Check</button>

                </form>

                <!-- 🔥 RESULT -->
                {% if result %}
                    {% if "Fraud" in result %}
                        <div class="result text-center text-danger">
                            {{ result }}
                        </div>
                    {% else %}
                        <div class="result text-center text-success">
                            {{ result }}
                        </div>
                    {% endif %}
                {% else %}
                    <div class="result text-center text-secondary">
                        Enter details
                    </div>
                {% endif %}

            </div>

        </div>
    </div>

</div>

</body>
</html>
